<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IVR Flow</title>
<style>
:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#1f2937;
--line:#d8c58a;
--shadow:0 10px 25px rgba(0,0,0,.08);
--blue:#17178f;
--yellow:#e7c63b;
--green:#35a765;
--red:#cf2e2e;
--gray:#f3f4f6;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.page{max-width:1700px;margin:auto;padding:20px}
.header{background:#fff;padding:16px 20px;border-radius:16px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px}
.header h1{margin:0;font-size:26px}
.header .sub{font-size:13px;color:#6b7280;margin-top:4px}
.search input{width:320px;max-width:100%;padding:10px 12px;border-radius:10px;border:1px solid #d1d5db}
.menu-bar{background:#fff;border-radius:14px;padding:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.menu-group{display:flex;flex-wrap:wrap;gap:8px}
.menu-title{width:100%;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:2px}
.menu-item{border:1px solid #e5e7eb;padding:6px 14px;border-radius:999px;background:#fff;font-size:13px;cursor:pointer}
.menu-item.active{background:#2563eb;color:#fff;border-color:#2563eb}
.layout{display:grid;grid-template-columns:1fr 330px;gap:20px}
.diagram-wrap{background:#fff;border-radius:16px;padding:12px;box-shadow:var(--shadow)}
.diagram{overflow:auto;padding:6px}
.tree{transform:scale(.78);transform-origin:top center;min-width:1450px;display:flex;justify-content:center;padding-bottom:40px}
.tree ul{position:relative;padding-top:28px;display:flex;justify-content:center;margin:0}
.tree li{list-style:none;text-align:center;position:relative;padding:28px 10px 0 10px}
.tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid var(--line);width:50%;height:28px}
.tree li::after{right:auto;left:50%;border-left:2px solid var(--line)}
.tree li:only-child::before,.tree li:only-child::after{display:none}
.tree li:only-child{padding-top:0}
.tree li:first-child::before,.tree li:last-child::after{border:0}
.tree li:last-child::before{border-right:2px solid var(--line);border-radius:0 10px 0 0}
.tree li:first-child::after{border-radius:10px 0 0 0}
.tree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid var(--line);height:28px}
.node{width:235px;padding:0;border-radius:12px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.06);text-align:left;cursor:pointer;overflow:hidden;border:1px solid rgba(0,0,0,.08)}
.node:hover{box-shadow:0 10px 20px rgba(0,0,0,.10)}
.node.active{outline:3px solid rgba(37,99,235,.25)}
.node-head{display:flex;align-items:stretch;min-height:64px}
.corner{width:26px;flex:0 0 26px;background:linear-gradient(135deg,var(--blue) 0 50%,transparent 50% 100%);position:relative}
.corner span{position:absolute;top:5px;left:6px;font-size:10px;font-weight:bold;color:#fff}
.body{padding:10px 12px;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:bold;font-size:13px;line-height:1.25;flex:1}
.node.yellow .body{background:var(--yellow)}
.node.green .body{background:var(--green);color:#072b16}
.node.blue .body{background:var(--blue);color:#fff}
.node.red .body{background:var(--red);color:#fff}
.node.gray .body{background:var(--gray)}
.node.small{width:210px}
.node.decision{width:190px;border:none;box-shadow:none;background:transparent;overflow:visible}
.node.decision .diamond{width:150px;height:150px;background:#ececec;border:2px solid #c8c8c8;transform:rotate(45deg);margin:15px auto;display:flex;align-items:center;justify-content:center;padding:20px}
.node.decision .diamond-text{transform:rotate(-45deg);font-weight:bold;font-size:13px;line-height:1.2;text-align:center;color:#444}
.node.note{width:250px;border:2px dashed #bdbdbd;box-shadow:none}
.node.note .body{background:#fafafa;font-weight:normal;text-align:left;justify-content:flex-start;padding:14px}
.node-label{font-size:11px;color:#666;margin-top:6px}
.details{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);position:sticky;top:20px;height:max-content}
.field{margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:8px}
.field:last-child{border-bottom:none}
.name{font-size:11px;color:#6b7280;text-transform:uppercase;margin-bottom:3px}
.content{font-size:14px;line-height:1.5}
.hint{font-size:12px;color:#6b7280}
.hidden{display:none!important}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.details{position:static}.tree{transform:scale(.65);transform-origin:top left;min-width:1300px}.search input{width:220px}}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div>
      <h1>IVR Flow</h1>
      <div class="sub">JSON-driven diagram matching the current draft flow.</div>
    </div>
    <div class="search"><input id="searchInput" placeholder="Search node text..."></div>
  </div>

  <div class="menu-bar">
    <div class="menu-group" id="networkMenu"></div>
    <div class="menu-group" id="serviceMenu"></div>
  </div>

  <div class="layout">
    <div class="diagram-wrap">
      <div class="diagram">
        <div class="tree" id="treeRoot"></div>
      </div>
    </div>
    <div class="details" id="detailsPanel"></div>
  </div>
</div>

<script>
const flows = {
  stc: {
    services: {
      "To request a new package or devices": {
        id: "request-package",
        label: "To request a new package or devices",
        digit: "1",
        color: "blue",
        prompt: "Initial option",
        children: []
      },
      "To manage your numbers": {
        id: "manage-numbers",
        label: "To manage your numbers",
        digit: "2",
        color: "green",
        prompt: "Customer selects service",
        children: [
          {
            id:"same-number",
            digit:"1",
            label:"To Serve you on the same number",
            prompt:"Continue on the same number",
            color:"yellow",
            children:[
              {
                id:"qn-postpaid",
                label:"IF QN Postpaid",
                prompt:"QuickNet Postpaid branch",
                color:"blue",
                children:[
                  {digit:"1",label:"To Manage your Quicknet package",prompt:"Manage package",color:"yellow"},
                  {digit:"2",label:"For Quick Net Support",prompt:"Support",color:"yellow"},
                  {digit:"3",label:"To stop the Quick Net temporarily",prompt:"Temporary stop",color:"yellow"},
                  {digit:"4",label:"To cancel Quick Net SIM",prompt:"Cancel SIM",color:"red"}
                ]
              },
              {
                id:"qn-prepaid",
                label:"IF QN Prepaid",
                prompt:"QuickNet Prepaid branch",
                color:"blue",
                children:[
                  {digit:"1",label:"To Manage your Quicknet package",prompt:"Manage package",color:"yellow"},
                  {digit:"2",label:"For Quick Net Support",prompt:"Support",color:"yellow"},
                  {digit:"3",label:"To stop the Quick Net temporarily",prompt:"Temporary stop",color:"yellow"},
                  {digit:"4",label:"To cancel Quick Net SIM",prompt:"Cancel SIM",color:"yellow"}
                ]
              },
              {
                id:"baity5g-branch",
                label:"IF Baity 5G",
                prompt:"Baity 5G branch",
                color:"blue",
                children:[
                  {digit:"1",label:"To Manage your Baity 5G package",prompt:"Manage package",color:"yellow"},
                  {digit:"2",label:"For Baity 5G Support",prompt:"Support",color:"yellow"},
                  {digit:"3",label:"To stop Baity 5G temporarily",prompt:"Temporary stop",color:"yellow"},
                  {digit:"4",label:"To cancel Baity 5G SIM",prompt:"Cancel SIM",color:"yellow"}
                ]
              }
            ]
          },
          {
            id:"another-number",
            digit:"2",
            label:"To serve another Mobile or Landline number",
            prompt:"Continue for another number",
            color:"yellow"
          },
          {
            id:"qn-baity-service",
            digit:"3",
            label:"For Quick Net & Baity 5G service",
            prompt:"Check service eligibility",
            color:"green",
            children:[
              {
                id:"decision-1",
                label:"Customer has QN or Baity 5G?",
                prompt:"Decision",
                type:"decision",
                yesLabel:"Yes",
                noLabel:"No",
                children:[
                  {
                    id:"yes-branch",
                    label:"Yes",
                    prompt:"Eligible",
                    color:"blue",
                    children:[
                      {
                        id:"yes-services",
                        label:"Eligible service options",
                        prompt:"Available services",
                        color:"gray",
                        children:[
                          {label:"IF QN Postpaid",prompt:"QuickNet Postpaid branch",color:"blue",children:[
                            {digit:"1",label:"To Manage your Quicknet package",color:"yellow"},
                            {digit:"2",label:"For Quick Net Support",color:"yellow"},
                            {digit:"3",label:"To stop the Quick Net temporarily",color:"yellow"},
                            {digit:"4",label:"To cancel Quick Net SIM",color:"red"}
                          ]},
                          {label:"IF QN Prepaid",prompt:"QuickNet Prepaid branch",color:"blue",children:[
                            {digit:"1",label:"To Manage your Quicknet package",color:"yellow"},
                            {digit:"2",label:"For Quick Net Support",color:"yellow"},
                            {digit:"3",label:"To stop the Quick Net temporarily",color:"yellow"},
                            {digit:"4",label:"To cancel Quick Net SIM",color:"yellow"}
                          ]},
                          {label:"IF Baity 5G",prompt:"Baity 5G branch",color:"blue",children:[
                            {digit:"1",label:"To Manage your Baity 5G package",color:"yellow"},
                            {digit:"2",label:"For Baity 5G Support",color:"yellow"},
                            {digit:"3",label:"To stop Baity 5G temporarily",color:"yellow"},
                            {digit:"4",label:"To cancel Baity 5G SIM",color:"yellow"}
                          ]}
                        ]
                      }
                    ]
                  },
                  {
                    id:"no-branch",
                    label:"No",
                    prompt:"Not eligible",
                    color:"blue",
                    children:[
                      {
                        id:"no-note",
                        label:"Dear Customer, You do not have any Quicknet or Baity 5G SIM for the same ID.",
                        type:"note",
                        color:"gray"
                      },
                      {
                        id:"no-options",
                        label:"Available purchase options",
                        prompt:"Get new SIM",
                        color:"gray",
                        children:[
                          {digit:"1",label:"To get Quick net SIM",color:"yellow"},
                          {digit:"2",label:"To get Baity 5G SIM",color:"yellow"}
                        ]
                      }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
    }
  },
  "non-stc": {
    services: {
      "No flow yet": {
        id: "non-stc-placeholder",
        label: "non-stc",
        prompt: "Flow will be added later.",
        color: "gray",
        children: []
      }
    }
  }
};

const networks = ["stc", "non-stc"];
let selectedNetwork = "stc";
let selectedService = "To manage your numbers";
let selectedId = null;
let nodeMap = new Map();
let currentFlow = null;

function withIds(node, path = 'n', digits = []) {
  const clone = { ...node };
  if (!clone.id) clone.id = path;
  clone.dtmfPath = [...digits, clone.digit].filter(Boolean).join(' → ');
  if (clone.children) {
    clone.children = clone.children.map((child, idx) => withIds(child, `${clone.id}-${idx+1}`, [...digits, clone.digit].filter(Boolean)));
  }
  return clone;
}

function getCurrentFlow() {
  const services = flows[selectedNetwork].services;
  const firstKey = Object.keys(services)[0];
  if (!services[selectedService]) selectedService = firstKey;
  return withIds(services[selectedService]);
}

function rebuildNodeMap(node, path = []) {
  const currentPath = [...path, node.label];
  nodeMap.set(node.id, { ...node, path: currentPath.join(' → ') });
  (node.children || []).forEach(child => rebuildNodeMap(child, currentPath));
}

function renderMenus() {
  const net = document.getElementById('networkMenu');
  const svc = document.getElementById('serviceMenu');
  net.innerHTML = "<div class='menu-title'>Network</div>";
  networks.forEach(n => {
    const b = document.createElement('button');
    b.className = 'menu-item' + (n === selectedNetwork ? ' active' : '');
    b.textContent = n;
    b.onclick = () => {
      selectedNetwork = n;
      selectedService = Object.keys(flows[selectedNetwork].services)[0];
      loadFlow();
    };
    net.appendChild(b);
  });

  svc.innerHTML = "<div class='menu-title'>Service</div>";
  Object.keys(flows[selectedNetwork].services).forEach(s => {
    const b = document.createElement('button');
    b.className = 'menu-item' + (s === selectedService ? ' active' : '');
    b.textContent = s;
    b.onclick = () => {
      selectedService = s;
      loadFlow();
    };
    svc.appendChild(b);
  });
}

function createStandardNode(node) {
  const card = document.createElement('div');
  card.className = `node ${node.color || 'gray'} ${node.small ? 'small' : ''}`;
  card.dataset.id = node.id;
  card.innerHTML = `
    <div class="node-head">
      <div class="corner"><span>${node.digit || ''}</span></div>
      <div class="body">${node.label || ''}</div>
    </div>`;
  card.onclick = (e) => {
    e.stopPropagation();
    selectedId = node.id;
    highlight();
    renderDetails();
  };
  return card;
}

function createDecisionNode(node) {
  const wrap = document.createElement('div');
  wrap.className = 'node decision';
  wrap.dataset.id = node.id;
  wrap.innerHTML = `<div class="diamond"><div class="diamond-text">${node.label}</div></div>`;
  wrap.onclick = (e) => {
    e.stopPropagation();
    selectedId = node.id;
    highlight();
    renderDetails();
  };
  return wrap;
}

function createNoteNode(node) {
  const card = document.createElement('div');
  card.className = 'node note';
  card.dataset.id = node.id;
  card.innerHTML = `<div class="body">${node.label}</div>`;
  card.onclick = (e) => {
    e.stopPropagation();
    selectedId = node.id;
    highlight();
    renderDetails();
  };
  return card;
}

function buildTree(node) {
  const li = document.createElement('li');
  li.dataset.id = node.id;

  let card;
  if (node.type === 'decision') card = createDecisionNode(node);
  else if (node.type === 'note') card = createNoteNode(node);
  else card = createStandardNode(node);

  li.appendChild(card);

  if (node.children && node.children.length) {
    const ul = document.createElement('ul');
    node.children.forEach(c => ul.appendChild(buildTree(c)));
    li.appendChild(ul);
  }

  return li;
}

function renderTree() {
  const root = document.getElementById('treeRoot');
  root.innerHTML = '';
  const ul = document.createElement('ul');
  ul.appendChild(buildTree(currentFlow));
  root.appendChild(ul);
  highlight();
  applySearch();
}

function highlight() {
  document.querySelectorAll('.node').forEach(n => n.classList.toggle('active', n.dataset.id === selectedId));
}

function renderDetails() {
  const node = nodeMap.get(selectedId);
  const panel = document.getElementById('detailsPanel');
  if (!node) return;
  panel.innerHTML = `
    <div class='field'>
      <div class='name'>Network</div>
      <div class='content'>${selectedNetwork}</div>
    </div>
    <div class='field'>
      <div class='name'>Service</div>
      <div class='content'>${selectedService}</div>
    </div>
    <div class='field'>
      <div class='name'>Node</div>
      <div class='content'>${node.label}</div>
    </div>
    <div class='field'>
      <div class='name'>Prompt</div>
      <div class='content'>${node.prompt || '-'}</div>
    </div>
    <div class='field'>
      <div class='name'>DTMF Path</div>
      <div class='content'>${node.dtmfPath || '-'}</div>
    </div>
    <div class='field'>
      <div class='name'>Path</div>
      <div class='content'>${node.path || '-'}</div>
    </div>
    <div class='field'>
      <div class='name'>Notes</div>
      <div class='content hint'>Current flow is based on the draft image. Add the remaining branches later in the same JSON structure.</div>
    </div>`;
}

function loadFlow() {
  currentFlow = getCurrentFlow();
  nodeMap = new Map();
  rebuildNodeMap(currentFlow);
  selectedId = currentFlow.id;
  renderMenus();
  renderTree();
  renderDetails();
}

function applySearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const items = document.querySelectorAll('#treeRoot li');
  if (!q) {
    items.forEach(i => i.classList.remove('hidden'));
    return;
  }

  function subtreeMatches(node) {
    const text = [node.label, node.prompt, node.dtmfPath].filter(Boolean).join(' ').toLowerCase();
    if (text.includes(q)) return true;
    return (node.children || []).some(subtreeMatches);
  }

  nodeMap.forEach((node, id) => {
    const li = document.querySelector(`#treeRoot li[data-id="${id}"]`);
    if (!li) return;
    li.classList.toggle('hidden', !subtreeMatches(node));
  });
}

document.getElementById('searchInput').addEventListener('input', applySearch);
loadFlow();
</script>
</body>
</html>
