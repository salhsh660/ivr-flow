<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVR Flow Diagram</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d6deea;
      --accent: #0f172a;
      --accent-2: #2563eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    .layout-top {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .sidebar {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      align-self: start;
      position: sticky;
      top: 20px;
    }

    .sidebar-header h2 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .sidebar-header p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .sidebar-group + .sidebar-group {
      margin-top: 18px;
    }

    .sidebar-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: bold;
    }

    .segment-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .segment-item {
      width: 100%;
      text-align: left;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: 0.2s ease;
    }

    .segment-item:hover {
      border-color: #c7d2fe;
      transform: translateY(-1px);
    }

    .segment-item.active {
      background: #eff6ff;
      border-color: #93c5fd;
      color: #1d4ed8;
      font-weight: bold;
    }

    .main-stage {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .compact-toolbar {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .compact-toolbar h1 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    .compact-toolbar p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 420px;
      justify-content: flex-end;
    }

    .toolbar-actions input {
      flex: 1;
      min-width: 240px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
      background: white;
    }

    .toolbar-actions button {
      border: none;
      background: var(--accent);
      color: white;
      padding: 12px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .segment-banner {
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      border-radius: 24px;
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }

    .segment-banner .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.75;
      margin-bottom: 8px;
    }

    .segment-banner .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .segment-banner .desc {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.6fr 0.75fr;
      gap: 18px;
      align-items: start;
    }

    .diagram-wrap, .details {
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid #e5e7eb;
    }

    .diagram-header, .details-header {
      padding: 18px 18px 0;
    }

    .diagram-header h2, .details-header h2 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .diagram-header p, .details-header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .diagram {
      overflow: auto;
      padding: 14px 14px 22px;
      background: linear-gradient(180deg, #fcfdff, #f8fafc);
      border-radius: 0 0 24px 24px;
    }

    .tree {
      display: flex;
      justify-content: center;
      min-width: 920px;
      padding: 0 0 10px;
      transform: scale(0.88);
      transform-origin: top center;
    }

    .tree ul {
      position: relative;
      padding-top: 22px;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .tree li {
      list-style: none;
      text-align: center;
      position: relative;
      padding: 22px 10px 0 10px;
    }

    .tree li::before,
    .tree li::after {
      content: '';
      position: absolute;
      top: 0;
      right: 50%;
      border-top: 2px solid var(--line);
      width: 50%;
      height: 22px;
    }

    .tree li::after {
      right: auto;
      left: 50%;
      border-left: 2px solid var(--line);
    }

    .tree li:only-child::before,
    .tree li:only-child::after {
      display: none;
    }

    .tree li:only-child {
      padding-top: 0;
    }

    .tree li:first-child::before,
    .tree li:last-child::after {
      border: 0;
    }

    .tree li:last-child::before {
      border-right: 2px solid var(--line);
      border-radius: 0 12px 0 0;
    }

    .tree li:first-child::after {
      border-radius: 12px 0 0 0;
    }

    .tree ul ul::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      border-left: 2px solid var(--line);
      width: 0;
      height: 22px;
    }

    .node {
      width: 185px;
      background: white;
      border: 1px solid #dbe3f0;
      border-radius: 16px;
      padding: 12px;
      display: inline-block;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.05);
      cursor: pointer;
      transition: 0.2s ease;
      text-align: left;
    }

    .node:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }

    .node.active {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .node .top {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 11px;
      background: #eff6ff;
      color: var(--accent-2);
      font-weight: bold;
    }

    .type {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 11px;
    }

    .node h3 {
      margin: 0 0 5px;
      font-size: 14px;
    }

    .node p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .node .target {
      margin-top: 8px;
      font-size: 11px;
      color: #0f172a;
      font-weight: bold;
    }

    .details {
      position: sticky;
      top: 20px;
    }

    .details-body {
      padding: 18px;
    }

    .field {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #eef2f7;
    }

    .field:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .field .name {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field .content {
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .mini-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .mini-btn {
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
    }

    .hidden-node {
      display: none !important;
    }

    @media (max-width: 1100px) {
      .layout-top {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .compact-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar-actions {
        min-width: 0;
        width: 100%;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .details {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="layout-top">
      <aside class="sidebar" id="segmentSidebar">
        <div class="sidebar-header">
          <h2>Customer Segments</h2>
          <p>Select customer type and account status.</p>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-label">Type</div>
          <div class="segment-list" id="customerTypeList"></div>
        </div>
        <div class="sidebar-group">
          <div class="sidebar-label">Status</div>
          <div class="segment-list" id="customerStatusList"></div>
        </div>
      </aside>

      <section class="main-stage">
        <div class="compact-toolbar">
          <div>
            <h1>IVR Call Flow</h1>
            <p>Interactive map for the selected customer segment.</p>
          </div>
          <div class="toolbar-actions">
            <input id="searchInput" type="text" placeholder="Search service, queue, path..." />
            <button id="resetBtn">Reset</button>
          </div>
        </div>

        <div class="segment-banner" id="segmentBanner"></div>
      </section>
    </div>

    <div class="layout">
      <div class="diagram-wrap">
        <div class="diagram-header">
          <h2>Flow Diagram</h2>
          <p>Click any node to view its details.</p>
        </div>
        <div class="diagram">
          <div class="tree" id="treeRoot"></div>
        </div>
      </div>

      <div class="details">
        <div class="details-header">
          <h2>Node Details</h2>
          <p>Information about the selected branch.</p>
        </div>
        <div class="details-body" id="detailsPanel"></div>
      </div>
    </div>
  </div>

  <script>
    const customerTypes = [
      'VIP customers',
      'Old customers',
      'New customers',
      'High customers'
    ];

    const customerStatuses = [
      'Active',
      'Suspended',
      'Dunning 1',
      'Dunning 2',
      'Black listed'
    ];

    let selectedType = customerTypes[0];
    let selectedStatus = customerStatuses[0];

    const ivrData = {
      id: "root",
      label: "Entry Point",
      prompt: "Customer identified and routed to the matching IVR journey.",
      type: "greeting",
      hours: "24/7",
      children: [
        {
          id: "identity",
          digit: "1",
          label: "Identity & Verification",
          prompt: "Verify account and customer segment.",
          type: "menu",
          children: [
            {
              id: "otp",
              digit: "1",
              label: "OTP Verification",
              prompt: "Send one time password to the registered number.",
              type: "route",
              target: "Authentication Service",
              hours: "24/7"
            },
            {
              id: "pin",
              digit: "2",
              label: "PIN Validation",
              prompt: "Validate customer PIN and continue.",
              type: "route",
              target: "Customer Identity API",
              hours: "24/7"
            }
          ]
        },
        {
          id: "service-menu",
          digit: "2",
          label: "Service Menu",
          prompt: "Move customer to service options based on profile.",
          type: "menu",
          children: [
            {
              id: "billing",
              digit: "1",
              label: "Billing & Payments",
              prompt: "Billing balance, invoice, and payment actions.",
              type: "menu",
              children: [
                {
                  id: "balance",
                  digit: "1",
                  label: "Outstanding Balance",
                  prompt: "Read current outstanding balance.",
                  type: "route",
                  target: "Billing Information Service",
                  hours: "24/7"
                },
                {
                  id: "pay-now",
                  digit: "2",
                  label: "Pay Now",
                  prompt: "Transfer to payment gateway or send payment link.",
                  type: "route",
                  target: "Payment Gateway",
                  hours: "24/7"
                },
                {
                  id: "promise-pay",
                  digit: "3",
                  label: "Promise to Pay",
                  prompt: "Register promise to pay request for eligible users.",
                  type: "route",
                  target: "Collections Workflow",
                  hours: "24/7"
                }
              ]
            },
            {
              id: "support",
              digit: "2",
              label: "Technical Support",
              prompt: "Troubleshooting and service restoration.",
              type: "menu",
              children: [
                {
                  id: "incident",
                  digit: "1",
                  label: "Open Incident",
                  prompt: "Create new support incident.",
                  type: "route",
                  target: "Incident Management Queue",
                  hours: "24/7"
                },
                {
                  id: "outage",
                  digit: "2",
                  label: "Known Outage",
                  prompt: "Play outage status or estimated restoration time.",
                  type: "route",
                  target: "Network Outage Service",
                  hours: "24/7"
                },
                {
                  id: "priority-support",
                  digit: "3",
                  label: "Priority Support",
                  prompt: "Available for premium or eligible customers.",
                  type: "route",
                  target: "Priority Support Queue",
                  hours: "24/7"
                }
              ]
            },
            {
              id: "retention",
              digit: "3",
              label: "Retention & Complaints",
              prompt: "Complaints, cancellation, retention, and special cases.",
              type: "menu",
              children: [
                {
                  id: "complaint",
                  digit: "1",
                  label: "Register Complaint",
                  prompt: "Open a new complaint request.",
                  type: "route",
                  target: "Complaint Registration Queue",
                  hours: "Sun-Thu 8:00-20:00"
                },
                {
                  id: "followup",
                  digit: "2",
                  label: "Complaint Follow-up",
                  prompt: "Check complaint status and follow-up actions.",
                  type: "route",
                  target: "Complaint Follow-up Team",
                  hours: "Sun-Thu 8:00-20:00"
                },
                {
                  id: "retention-offer",
                  digit: "3",
                  label: "Retention Offer",
                  prompt: "Transfer customer to retention team if eligible.",
                  type: "route",
                  target: "Retention Desk",
                  hours: "Sun-Thu 8:00-22:00"
                }
              ]
            }
          ]
        },
        {
          id: "self-service",
          digit: "8",
          label: "Digital Self-Service",
          prompt: "Send digital service link by SMS or WhatsApp.",
          type: "route",
          target: "SMS / WhatsApp Gateway",
          hours: "24/7"
        },
        {
          id: "agent",
          digit: "0",
          label: "Live Agent",
          prompt: "Transfer to the best matching queue.",
          type: "route",
          target: "Routing Engine / Frontline Agent",
          hours: "24/7"
        }
      ]
    };

    const nodeMap = new Map();
    let selectedId = ivrData.id;

    function flatten(node, path = []) {
      const currentPath = [...path, node.label];
      const item = { ...node, path: currentPath.join(' → ') };
      nodeMap.set(node.id, item);
      let items = [item];
      if (node.children) {
        node.children.forEach(child => items = items.concat(flatten(child, currentPath)));
      }
      return items;
    }

    const allNodes = flatten(ivrData);

    function renderSegmentControls() {
      const typeWrap = document.getElementById('customerTypeList');
      const statusWrap = document.getElementById('customerStatusList');

      typeWrap.innerHTML = customerTypes.map(type => `
        <button class="segment-item ${type === selectedType ? 'active' : ''}" onclick="setCustomerType('${type}')">${type}</button>
      `).join('');

      statusWrap.innerHTML = customerStatuses.map(status => `
        <button class="segment-item ${status === selectedStatus ? 'active' : ''}" onclick="setCustomerStatus('${status}')">${status}</button>
      `).join('');

      document.getElementById('segmentBanner').innerHTML = `
        <div class="eyebrow">Selected flow</div>
        <div class="title">${selectedType} · ${selectedStatus}</div>
        <div class="desc">Use the left menu to switch between customer categories and account conditions. Each segment may have a different routing policy, payment option, and escalation path.</div>
      `;
    }

    function setCustomerType(type) {
      selectedType = type;
      renderSegmentControls();
    }

    function setCustomerStatus(status) {
      selectedStatus = status;
      renderSegmentControls();
    }

    function buildTree(node) {
      const li = document.createElement('li');
      li.dataset.id = node.id;

      const card = document.createElement('div');
      card.className = 'node';
      card.dataset.id = node.id;

      const top = document.createElement('div');
      top.className = 'top';

      if (node.digit !== undefined) {
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = node.digit;
        top.appendChild(badge);
      }

      const type = document.createElement('span');
      type.className = 'type';
      type.textContent = node.type;
      top.appendChild(type);

      const title = document.createElement('h3');
      title.textContent = node.label;

      const prompt = document.createElement('p');
      prompt.textContent = node.prompt || '-';

      card.appendChild(top);
      card.appendChild(title);
      card.appendChild(prompt);

      if (node.target) {
        const target = document.createElement('div');
        target.className = 'target';
        target.textContent = '→ ' + node.target;
        card.appendChild(target);
      }

      card.addEventListener('click', () => selectNode(node.id));
      li.appendChild(card);

      if (node.children && node.children.length) {
        const ul = document.createElement('ul');
        node.children.forEach(child => ul.appendChild(buildTree(child)));
        li.appendChild(ul);
      }

      return li;
    }

    function renderTree() {
      const root = document.getElementById('treeRoot');
      root.innerHTML = '';
      const ul = document.createElement('ul');
      ul.appendChild(buildTree(ivrData));
      root.appendChild(ul);
      refreshActiveNode();
    }

    function refreshActiveNode() {
      document.querySelectorAll('.node').forEach(el => {
        el.classList.toggle('active', el.dataset.id === selectedId);
      });
    }

    function selectNode(id) {
      selectedId = id;
      refreshActiveNode();
      renderDetails();
    }

    function renderDetails() {
      const panel = document.getElementById('detailsPanel');
      const node = nodeMap.get(selectedId);
      if (!node) return;

      const nextOptions = (node.children || []).map(child => {
        return `<button class="mini-btn" onclick="selectNode('${child.id}')">${child.digit ?? '-'} - ${child.label}</button>`;
      }).join('');

      panel.innerHTML = `
        <div class="field">
          <div class="name">Selected segment</div>
          <div class="content"><strong>${selectedType}</strong> · ${selectedStatus}</div>
        </div>
        <div class="field">
          <div class="name">Label</div>
          <div class="content"><strong>${node.label}</strong></div>
        </div>
        <div class="field">
          <div class="name">Digit</div>
          <div class="content">${node.digit ?? '-'}</div>
        </div>
        <div class="field">
          <div class="name">Type</div>
          <div class="content">${node.type}</div>
        </div>
        <div class="field">
          <div class="name">Prompt</div>
          <div class="content">${node.prompt || '-'}</div>
        </div>
        <div class="field">
          <div class="name">Path</div>
          <div class="content">${node.path}</div>
        </div>
        <div class="field">
          <div class="name">Target</div>
          <div class="content">${node.target || '-'}</div>
        </div>
        <div class="field">
          <div class="name">Working hours</div>
          <div class="content">${node.hours || '-'}</div>
        </div>
        <div class="field">
          <div class="name">Next options</div>
          <div class="content">${nextOptions ? `<div class="mini-list">${nextOptions}</div>` : 'No further branches'}</div>
        </div>
      `;
    }

    function updateSummary() {
      return allNodes.length;
    }

    function applySearch() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const listItems = document.querySelectorAll('.tree li');

      if (!q) {
        listItems.forEach(li => li.classList.remove('hidden-node'));
        return;
      }

      function nodeMatches(node) {
        return [node.label, node.prompt, node.target, node.path, node.digit, node.hours]
          .filter(Boolean)
          .some(v => String(v).toLowerCase().includes(q));
      }

      function subtreeMatches(node) {
        if (nodeMatches(node)) return true;
        return (node.children || []).some(child => subtreeMatches(child));
      }

      allNodes.forEach(node => {
        const li = document.querySelector(`li[data-id="${node.id}"]`);
        if (!li) return;
        const originalNode = nodeMap.get(node.id);
        li.classList.toggle('hidden-node', !subtreeMatches(originalNode));
      });
    }

    document.getElementById('searchInput').addEventListener('input', applySearch);
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      selectedId = ivrData.id;
      applySearch();
      refreshActiveNode();
      renderDetails();
    });

    renderSegmentControls();
    renderTree();
    updateSummary();
    renderDetails();
  </script>
</body>
</html>
