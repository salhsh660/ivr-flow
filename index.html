<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IVR Flow</title>
<style>
:root{
--bg:#f4f6fb;
--card:#ffffff;
--text:#1f2937;
--line:#d5deea;
--shadow:0 10px 25px rgba(0,0,0,.08);
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
}

.page{
max-width:1600px;
margin:auto;
padding:20px;
}

.header{
background:white;
padding:16px 20px;
border-radius:16px;
box-shadow:var(--shadow);
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.header h1{
margin:0;
font-size:26px;
}

.menu-bar{
background:white;
border-radius:14px;
padding:12px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:18px;
}

.menu-group{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.menu-title{
width:100%;
font-size:12px;
text-transform:uppercase;
letter-spacing:.05em;
color:#6b7280;
margin-bottom:2px;
}

.menu-item{
border:1px solid #e5e7eb;
padding:6px 14px;
border-radius:999px;
background:#fff;
font-size:13px;
cursor:pointer;
}

.menu-item.active{
background:#2563eb;
color:white;
border-color:#2563eb;
}

.layout{
display:grid;
grid-template-columns:1fr 320px;
gap:20px;
}

.diagram-wrap{
background:white;
border-radius:16px;
padding:12px;
box-shadow:var(--shadow);
}

.diagram{
overflow:auto;
padding:10px;
}

.tree{
transform:scale(.75);
transform-origin:top center;
min-width:1100px;
display:flex;
justify-content:center;
}

.tree ul{
position:relative;
padding-top:20px;
display:flex;
justify-content:center;
}

.tree li{
list-style:none;
text-align:center;
position:relative;
padding:20px 8px 0 8px;
}

.tree li::before,
.tree li::after{
content:'';
position:absolute;
top:0;
right:50%;
border-top:2px solid var(--line);
width:50%;
height:20px;
}

.tree li::after{
right:auto;
left:50%;
border-left:2px solid var(--line);
}

.tree ul ul::before{
content:'';
position:absolute;
top:0;
left:50%;
border-left:2px solid var(--line);
height:20px;
}

.node{
width:190px;
padding:10px;
border-radius:10px;
background:#fff;
border:1px solid #e4e9f2;
box-shadow:0 6px 12px rgba(0,0,0,.05);
text-align:left;
}

.node h3{
margin:0 0 4px;
font-size:13px;
}

.node p{
margin:0;
font-size:11px;
color:#6b7280;
}

.badge{
background:#1e3a8a;
color:white;
font-size:10px;
padding:2px 6px;
border-radius:6px;
margin-right:4px;
}

.node.yellow{background:#fde68a}
.node.green{background:#bbf7d0}
.node.blue{background:#c7d2fe}
.node.red{background:#fecaca}

.details{
background:white;
border-radius:16px;
padding:16px;
box-shadow:var(--shadow);
}

.field{
margin-bottom:12px;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.name{
font-size:11px;
color:#6b7280;
text-transform:uppercase;
margin-bottom:3px;
}

.content{
font-size:14px;
}

@media(max-width:1000px){
.layout{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="page">

<div class="header">
<h1>IVR Flow</h1>
</div>

<div class="menu-bar">

<div class="menu-group" id="networkMenu"></div>

<div class="menu-group" id="serviceMenu"></div>

</div>

<div class="layout">

<div class="diagram-wrap">
<div class="diagram">
<div class="tree" id="treeRoot"></div>
</div>
</div>

<div class="details" id="detailsPanel"></div>

</div>

</div>

<script>

const networks=["stc","non-stc"];
let selectedNetwork="stc";

const stcMenu=[
"To request a new package or devices",
"To manage your numbers"
];

let selectedService=stcMenu[0];

const ivrData={
id:"root",
label:"To manage your numbers",
prompt:"Customer selects service",
type:"menu",
color:"green",
children:[
{
id:"same-number",
digit:"1",
label:"To serve you on the same number",
prompt:"Serve same number",
color:"yellow"
},
{
id:"another-number",
digit:"2",
label:"To serve another Mobile or Landline number",
prompt:"Serve another number",
color:"yellow"
},
{
id:"bait-5g",
digit:"3",
label:"For Quick Net & Baity 5G service",
prompt:"Check eligibility",
color:"green"
}
]
};

const nodeMap=new Map();
let selectedId="root";

function flatten(node,path=[]){
const current=[...path,node.label];
nodeMap.set(node.id,{...node,path:current.join(" → ")});
if(node.children)node.children.forEach(c=>flatten(c,current));
}
flatten(ivrData);

function renderMenus(){
const net=document.getElementById("networkMenu");
const svc=document.getElementById("serviceMenu");

net.innerHTML="<div class='menu-title'>Network</div>";

networks.forEach(n=>{
const b=document.createElement("button");
b.className="menu-item"+(n===selectedNetwork?" active":"");
b.textContent=n;
b.onclick=()=>{selectedNetwork=n;renderMenus();};
net.appendChild(b);
});

svc.innerHTML="<div class='menu-title'>Service</div>";

if(selectedNetwork==="stc"){
stcMenu.forEach(s=>{
const b=document.createElement("button");
b.className="menu-item"+(s===selectedService?" active":"");
b.textContent=s;
b.onclick=()=>{selectedService=s;renderMenus();};
svc.appendChild(b);
});
}
}

function buildTree(node){
const li=document.createElement("li");

const card=document.createElement("div");
card.className="node "+(node.color||"");
card.onclick=()=>{selectedId=node.id;renderDetails();};

card.innerHTML=`<h3><span class='badge'>${node.digit||""}</span>${node.label}</h3><p>${node.prompt||""}</p>`;

li.appendChild(card);

if(node.children){
const ul=document.createElement("ul");
node.children.forEach(c=>ul.appendChild(buildTree(c)));
li.appendChild(ul);
}

return li;
}

function renderTree(){
const root=document.getElementById("treeRoot");
root.innerHTML="";
const ul=document.createElement("ul");
ul.appendChild(buildTree(ivrData));
root.appendChild(ul);
}

function renderDetails(){
const node=nodeMap.get(selectedId);

const panel=document.getElementById("detailsPanel");

panel.innerHTML=`
<div class='field'>
<div class='name'>Network</div>
<div class='content'>${selectedNetwork}</div>
</div>

<div class='field'>
<div class='name'>Service</div>
<div class='content'>${selectedService}</div>
</div>

<div class='field'>
<div class='name'>Node</div>
<div class='content'>${node.label}</div>
</div>

<div class='field'>
<div class='name'>Prompt</div>
<div class='content'>${node.prompt||"-"}</div>
</div>

<div class='field'>
<div class='name'>Path</div>
<div class='content'>${node.path}</div>
</div>
`;
}

renderMenus();
renderTree();
renderDetails();

</script>

</body>
</html>
