<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IVR Flow Diagram</title>
<style>
:root{
--bg:#f5f7fb;
--card:#ffffff;
--text:#1f2937;
--muted:#6b7280;
--line:#d6deea;
--accent:#0f172a;
--accent2:#2563eb;
--shadow:0 10px 30px rgba(15,23,42,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--text);
}

.page{
max-width:1500px;
margin:auto;
padding:20px;
}

.header{
background:var(--card);
border-radius:18px;
padding:16px 20px;
box-shadow:var(--shadow);
border:1px solid #e5e7eb;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:16px;
}

.header h1{
margin:0;
font-size:26px;
}

.search{
flex:1;
display:flex;
justify-content:flex-end;
}

.search input{
width:320px;
padding:10px 12px;
border-radius:10px;
border:1px solid #d1d5db;
}

.segment-bar{
background:var(--card);
border-radius:16px;
padding:14px;
border:1px solid #e5e7eb;
box-shadow:var(--shadow);
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:16px;
}

.segment-group{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.segment-title{
width:100%;
font-size:12px;
text-transform:uppercase;
letter-spacing:.06em;
color:var(--muted);
margin-bottom:4px;
}

.segment-item{
border:1px solid #e5e7eb;
background:white;
border-radius:999px;
padding:6px 12px;
font-size:13px;
cursor:pointer;
}

.segment-item.active{
background:#eff6ff;
border-color:#93c5fd;
color:#1d4ed8;
font-weight:bold;
}

.layout{
display:grid;
grid-template-columns:1fr 340px;
gap:18px;
}

.diagram-wrap{
background:var(--card);
border-radius:18px;
border:1px solid #e5e7eb;
box-shadow:var(--shadow);
padding:10px;
}

.diagram{
overflow:auto;
padding:10px;
}

.tree{
transform:scale(.75);
transform-origin:top center;
min-width:900px;
display:flex;
justify-content:center;
}

.tree ul{
position:relative;
padding-top:20px;
display:flex;
justify-content:center;
}

.tree li{
list-style:none;
text-align:center;
position:relative;
padding:20px 8px 0 8px;
}

.tree li::before,
.tree li::after{
content:'';
position:absolute;
top:0;
right:50%;
border-top:2px solid var(--line);
width:50%;
height:20px;
}

.tree li::after{
right:auto;
left:50%;
border-left:2px solid var(--line);
}

.tree ul ul::before{
content:'';
position:absolute;
top:0;
left:50%;
border-left:2px solid var(--line);
height:20px;
}

.node{
width:170px;
background:white;
border:1px solid #dbe3f0;
border-radius:14px;
padding:10px;
text-align:left;
box-shadow:0 6px 16px rgba(15,23,42,.05);
cursor:pointer;
}

.node:hover{
box-shadow:0 10px 18px rgba(15,23,42,.08);
}

.node.active{
border-color:var(--accent2);
}

.node h3{
margin:0 0 4px;
font-size:13px;
}

.node p{
margin:0;
font-size:11px;
color:var(--muted);
}

.badge{
background:#eff6ff;
color:#2563eb;
padding:2px 6px;
border-radius:999px;
font-size:10px;
margin-right:4px;
}

.details{
background:var(--card);
border-radius:18px;
border:1px solid #e5e7eb;
box-shadow:var(--shadow);
padding:16px;
position:sticky;
top:20px;
}

.field{
margin-bottom:12px;
border-bottom:1px solid #eef2f7;
padding-bottom:10px;
}

.field:last-child{
border-bottom:none;
}

.name{
font-size:11px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:4px;
}

.content{
font-size:14px;
}

@media(max-width:1000px){
.layout{grid-template-columns:1fr}
.details{position:static}
}
</style>
</head>

<body>
<div class="page">

<div class="header">
<h1>IVR Flow</h1>
<div class="search">
<input id="searchInput" placeholder="Search...">
</div>
</div>

<div class="segment-bar">
<div class="segment-group" id="customerTypeList"></div>
<div class="segment-group" id="customerStatusList"></div>
</div>

<div class="layout">

<div class="diagram-wrap">
<div class="diagram">
<div class="tree" id="treeRoot"></div>
</div>
</div>

<div class="details" id="detailsPanel"></div>

</div>

</div>

<script>
const customerTypes=["VIP customers","Old customers","New customers","High customers"];
const customerStatuses=["Active","Suspended","Dunning 1","Dunning 2","Black listed"];

let selectedType=customerTypes[0];
let selectedStatus=customerStatuses[0];

const ivrData={
id:"root",
label:"Entry",
prompt:"Customer enters IVR",
type:"menu",
children:[
{
id:"verify",
digit:"1",
label:"Verification",
prompt:"Verify customer",
type:"menu",
children:[
{id:"otp",digit:"1",label:"OTP",prompt:"Send OTP",type:"route",target:"Auth service"},
{id:"pin",digit:"2",label:"PIN",prompt:"Validate PIN",type:"route",target:"Auth API"}
]
},
{
id:"billing",
digit:"2",
label:"Billing",
prompt:"Billing options",
type:"menu",
children:[
{id:"balance",digit:"1",label:"Balance",prompt:"Check balance",type:"route",target:"Billing system"},
{id:"pay",digit:"2",label:"Pay bill",prompt:"Payment gateway",type:"route",target:"Payment gateway"}
]
},
{
id:"support",
digit:"3",
label:"Technical Support",
prompt:"Technical help",
type:"route",
target:"Support queue"
},
{
id:"agent",
digit:"0",
label:"Agent",
prompt:"Transfer to agent",
type:"route",
target:"Call center"
}
]
};

const nodeMap=new Map();
let selectedId=ivrData.id;

function flatten(node,path=[]){
const current=[...path,node.label];
nodeMap.set(node.id,{...node,path:current.join(" → ")});
let arr=[node];
if(node.children)node.children.forEach(c=>arr=arr.concat(flatten(c,current)));
return arr;
}
flatten(ivrData);

function renderSegments(){
const typeWrap=document.getElementById("customerTypeList");
const statusWrap=document.getElementById("customerStatusList");

const typeTitle=document.createElement("div");
typeTitle.className="segment-title";
typeTitle.textContent="Customer type";

const statusTitle=document.createElement("div");
statusTitle.className="segment-title";
statusTitle.textContent="Account status";

typeWrap.innerHTML="";
statusWrap.innerHTML="";

typeWrap.appendChild(typeTitle);
statusWrap.appendChild(statusTitle);

customerTypes.forEach(t=>{
const b=document.createElement("button");
b.className="segment-item"+(t===selectedType?" active":"");
b.textContent=t;
b.onclick=()=>{selectedType=t;renderSegments();renderDetails();};
typeWrap.appendChild(b);
});

customerStatuses.forEach(s=>{
const b=document.createElement("button");
b.className="segment-item"+(s===selectedStatus?" active":"");
b.textContent=s;
b.onclick=()=>{selectedStatus=s;renderSegments();renderDetails();};
statusWrap.appendChild(b);
});
}

function buildTree(node){
const li=document.createElement("li");

const card=document.createElement("div");
card.className="node";
card.onclick=()=>{selectedId=node.id;renderDetails();highlight();};

card.innerHTML=`<h3><span class="badge">${node.digit||""}</span>${node.label}</h3><p>${node.prompt||""}</p>`;

li.appendChild(card);

if(node.children){
const ul=document.createElement("ul");
node.children.forEach(c=>ul.appendChild(buildTree(c)));
li.appendChild(ul);
}

return li;
}

function renderTree(){
const root=document.getElementById("treeRoot");
root.innerHTML="";
const ul=document.createElement("ul");
ul.appendChild(buildTree(ivrData));
root.appendChild(ul);
}

function highlight(){
document.querySelectorAll(".node").forEach(n=>n.classList.remove("active"));
}

function renderDetails(){
const node=nodeMap.get(selectedId);
const panel=document.getElementById("detailsPanel");

panel.innerHTML=`
<div class="field">
<div class="name">Segment</div>
<div class="content">${selectedType} · ${selectedStatus}</div>
</div>

<div class="field">
<div class="name">Node</div>
<div class="content">${node.label}</div>
</div>

<div class="field">
<div class="name">Prompt</div>
<div class="content">${node.prompt||"-"}</div>
</div>

<div class="field">
<div class="name">Target</div>
<div class="content">${node.target||"-"}</div>
</div>

<div class="field">
<div class="name">Path</div>
<div class="content">${node.path}</div>
</div>`;
}

renderSegments();
renderTree();
renderDetails();
</script>

</body>
</html>
